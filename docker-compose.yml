services:
    # ------------------------
    # Laravel Application (PHP-FPM)
    # ------------------------
    app:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        container_name: useluminiiSite_app
        restart: unless-stopped
        working_dir: /var/www
        volumes:
            - ./:/var/www
        networks:
            - useluminiiSite
        depends_on:
            - db

    # ------------------------
    # Nginx Web Server
    # ------------------------
    nginx:
        image: nginx:1.27-alpine
        container_name: useluminiiSite_nginx
        restart: unless-stopped
        ports:
            - "8081:80"
            - "443:443"
        volumes:
            - ./:/var/www
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - app
        networks:
            - useluminiiSite

    # ------------------------
    # MySQL Database
    # ------------------------
    db:
        image: mysql:8.4
        container_name: useluminiiSite_db
        restart: unless-stopped
        environment:
            MYSQL_DATABASE: useluminiiSite
            MYSQL_ROOT_PASSWORD: rootpass
            MYSQL_USER: useluminiiSite_user
            MYSQL_PASSWORD: useluminiiSite_pass
        volumes:
            - dbdata:/var/lib/mysql
        networks:
            - useluminiiSite

    # ------------------------
    # phpMyAdmin (optional)
    # ------------------------
    phpmyadmin:
        image: phpmyadmin:latest
        container_name: useluminiiSite_phpmyadmin
        restart: unless-stopped
        ports:
            - "8080:80"
        environment:
            PMA_HOST: db
            PMA_USER: useluminiiSite_user
            PMA_PASSWORD: useluminiiSite_pass
        depends_on:
            - db
        networks:
            - useluminiiSite

# ------------------------
# Networks & Volumes
# ------------------------
networks:
    useluminiiSite:

volumes:
    dbdata:
